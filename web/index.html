<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEO SOC</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #17191c;
      --panel-2: #1f2226;
      --text: #f1f4f2;
      --muted: #aab2ae;
      --line: #30343a;
      --green: #30d158;
      --amber: #f4bf45;
      --red: #ff5f57;
      --cyan: #64d2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 650;
    }

    .stamp {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 86px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .metric .value {
      display: block;
      margin-top: 6px;
      font-size: 30px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 14px;
      align-items: start;
    }

    section {
      min-width: 0;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 650;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      background: var(--panel-2);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .status {
      display: inline-block;
      min-width: 66px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 12px;
      text-align: center;
      background: #2a2e34;
    }

    .status.done {
      color: var(--green);
    }

    .status.complete {
      color: var(--green);
    }

    .status.failed,
    .status.rejected,
    .status.conflict {
      color: var(--red);
    }

    .status.queued,
    .status.held,
    .status.no_route {
      color: var(--amber);
    }

    .rail {
      display: grid;
      gap: 10px;
    }

    .bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #2a2e34;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--cyan);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    .chain-lines {
      display: grid;
      gap: 6px;
    }

    .chain-line {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .chain-line:last-child {
      border-bottom: 0;
    }

    .chain-meta {
      display: inline-block;
      min-width: 64px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 650;
    }

    .chain-muted {
      color: var(--muted);
      font-size: 12px;
    }

    .trace-summary {
      display: grid;
      gap: 6px;
    }

    .trace-id {
      color: var(--muted);
      font-size: 12px;
    }

    .timeline {
      display: grid;
      gap: 6px;
    }

    .timeline-item {
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .timeline-item:last-child {
      border-bottom: 0;
    }

    .timeline-type {
      display: inline-block;
      min-width: 78px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
    }

    @media (max-width: 820px) {
      main {
        width: min(100vw - 20px, 1180px);
        padding-top: 16px;
      }

      header {
        display: block;
      }

      .stamp {
        margin-top: 8px;
        text-align: left;
      }

      .metrics,
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>CEO SOC</h1>
      </div>
      <div class="stamp" id="stamp">LOCAL</div>
    </header>

    <div class="metrics">
      <div class="metric"><span class="label">Queue</span><span class="value" id="m-queue">0</span></div>
      <div class="metric"><span class="label">Processed</span><span class="value" id="m-processed">0</span></div>
      <div class="metric"><span class="label">Failed</span><span class="value" id="m-failed">0</span></div>
      <div class="metric"><span class="label">Invalid</span><span class="value" id="m-invalid">0</span></div>
    </div>

    <div class="grid">
      <section>
        <h2>Unified Trace</h2>
        <div class="panel" id="traces-panel"></div>
      </section>
      <aside class="rail">
        <section>
          <h2>Signal</h2>
          <div class="panel">
            <table>
              <tbody>
                <tr><td>Health</td><td id="health">STABLE</td></tr>
                <tr><td>Mode</td><td>LOCAL_ONLY</td></tr>
                <tr><td>Writes</td><td>REPO_SCOPED</td></tr>
                <tr><td>Engine</td><td id="signal-engine">UNKNOWN</td></tr>
                <tr><td>Surface</td><td id="signal-surface">UNKNOWN</td></tr>
                <tr><td>Traces</td><td id="trace-count">0</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <script id="fallback-data" type="application/json">
{"generatedAt":"2026-06-23T22:00:00Z","metrics":{"queue":0,"processed":0,"failed":0,"invalid":0},"events":[],"unifiedTrace":[]}
  </script>
  <script>
    const fallback = JSON.parse(document.getElementById("fallback-data").textContent);

    function asNumber(value) {
      return Number.isFinite(Number(value)) ? Number(value) : 0;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function statusClass(value) {
      return String(value || "").toLowerCase();
    }

    function finalLabel(finalState) {
      return `${finalState?.status || "UNKNOWN"} ${finalState?.result || "UNKNOWN"}`;
    }

    function executionPathLabel(trace) {
      const path = Array.isArray(trace?.executionPath) ? trace.executionPath : [];
      return path.length ? path.join(" -> ") : "UNKNOWN";
    }

    function render(data) {
      const metrics = data.metrics || {};
      const traces = Array.isArray(data.unifiedTrace) ? data.unifiedTrace : [];
      document.getElementById("stamp").textContent = data.generatedAt || "LOCAL";
      document.getElementById("m-queue").textContent = asNumber(metrics.queue);
      document.getElementById("m-processed").textContent = asNumber(metrics.processed);
      document.getElementById("m-failed").textContent = asNumber(metrics.failed);
      document.getElementById("m-invalid").textContent = asNumber(metrics.invalid);

      const bad = asNumber(metrics.failed) + asNumber(metrics.invalid);
      const queued = asNumber(metrics.queue);
      const blockedTraces = traces.filter((trace) => trace.conflict || ["HOLD", "CONFLICT_HELD", "NO_ROUTE"].includes(String(trace.finalState?.status || ""))).length;
      document.getElementById("trace-count").textContent = traces.length;
      const firstTrace = traces[traces.length - 1] || {};
      document.getElementById("signal-engine").textContent = firstTrace.decisionEngine || "UNKNOWN";
      document.getElementById("signal-surface").textContent = firstTrace.executionSurface || "UNKNOWN";
      const health = bad > 0 || blockedTraces > 0 ? "CRITICAL" : queued > 10 ? "WATCH" : "STABLE";
      document.getElementById("health").textContent = health;

      const tracesPanel = document.getElementById("traces-panel");
      if (!traces.length) {
        tracesPanel.innerHTML = '<div class="empty">NO_UNIFIED_TRACE</div>';
        return;
      }

      const rows = traces.slice(-12).reverse().map((trace) => {
        const finalState = trace.finalState || {};
        const resolution = trace.conflictResolution || {};
        const timeline = Array.isArray(trace.timeline) ? trace.timeline : [];
        const timelineText = timeline.map((item) => {
          const meta = item.itemType === "decision" ? `Seq ${item.sequence} P${item.priority}` : item.itemType;
          const detail = item.itemType === "decision"
            ? `${item.agentRole} ${item.decisionType}`
            : `${item.label} ${item.status}`;
          const execPath = Array.isArray(item.executionPath) && item.executionPath.length
            ? item.executionPath.join(" -> ")
            : `${item.decisionEngine || ""} -> ${item.executionAdapter || ""} -> ${item.executionSurface || ""}`;
          return `<div class="timeline-item"><span class="timeline-type">${escapeHtml(meta)}</span>${escapeHtml(detail)}<br><span class="chain-muted">${escapeHtml(item.result || "")}</span><br><span class="chain-muted">${escapeHtml(execPath)}</span></div>`;
        }).join("");
        const sources = Array.isArray(trace.sourceTypes) ? trace.sourceTypes.join(", ") : "UNKNOWN";
        const conflictText = trace.conflict ? "CONFLICT" : String(resolution.status || "NO_CONFLICT");
        return `<tr><td><div class="trace-summary"><strong>${escapeHtml(sources)}</strong><span class="trace-id">${escapeHtml(trace.traceId)}</span><span>${escapeHtml(trace.eventCount)} events</span></div></td><td><strong>${escapeHtml(trace.decisionEngine || "UNKNOWN")}</strong><br><span class="chain-muted">${escapeHtml(trace.executionSurface || "UNKNOWN")}</span><br><span class="trace-id">${escapeHtml(executionPathLabel(trace))}</span></td><td><span class="status ${statusClass(finalState.status)}">${escapeHtml(finalLabel(finalState))}</span><br>${escapeHtml(conflictText)}<br>${escapeHtml(trace.priorityRule || "")}</td><td><div class="timeline">${timelineText}</div></td></tr>`;
      }).join("");

      tracesPanel.innerHTML = `<table><thead><tr><th>Trace</th><th>Ejecucion</th><th>Estado final</th><th>Timeline</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    fetch("data.json?t=" + Date.now(), { cache: "no-store" })
      .then((response) => response.ok ? response.json() : fallback)
      .then(render)
      .catch(() => render(fallback));
  </script>
</body>
</html>
