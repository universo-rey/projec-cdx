name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: ruff check src tests tools

      - name: Black
        run: black --check src tests tools

      - name: Tests with coverage
        run: |
          mkdir -p reports
          pytest --cov=src --cov-report=term-missing --cov-report=xml:reports/coverage.xml --cov-fail-under=45

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          if-no-files-found: ignore
          path: reports/coverage.xml
