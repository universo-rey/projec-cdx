name: meta-validate

on:
  push:
  pull_request:

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] jsonschema pydantic pyyaml

      - name: Validate metadata
        run: python -m tools.validate

      - name: Build metadata indexes
        run: python -m tools.build_index

      - name: Run tests
        run: pytest -q
