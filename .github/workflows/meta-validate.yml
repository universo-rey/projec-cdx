name: meta-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] jsonschema pydantic pyyaml

      - name: Validate metadata
        run: python -m tools.validate

      - name: Build metadata indexes
        run: python -m tools.build_index

      - name: Check metadata indexes are current
        run: git diff --exit-code -- index.json operativa/index.json

      - name: Run tests
        run: |
          mkdir -p reports
          pytest -q --junitxml=reports/pytest.xml

      - name: Upload metadata indexes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: metadata-indexes
          if-no-files-found: ignore
          path: |
            index.json
            operativa/index.json

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report
          if-no-files-found: ignore
          path: reports/pytest.xml
