name: build-graph

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.md"
      - "**/*.json"
      - "schema.json"
      - "pyproject.toml"
      - ".github/workflows/build-graph.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.md"
      - "**/*.json"
      - "schema.json"
      - "pyproject.toml"
      - ".github/workflows/build-graph.yml"
  workflow_dispatch:

jobs:
  graph:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] jsonschema pydantic pyyaml

      - name: Validate metadata
        run: python -m tools.validate

      - name: Build graph exports
        run: |
          mkdir -p outputs
          python main.py graph --output outputs/metadata-graph.json --format json
          python main.py graph --output outputs/metadata-graph.dot --format dot

      - name: Upload graph artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metadata-graph
          if-no-files-found: error
          path: outputs/metadata-graph.*
