schema_version: 1
contract_mode: ORGANISMO_VIVO_ENABLEMENT
principle: "Automatizar preparacion; decidir con revision humana."
rules:
  create_windows_scheduled_task: false
  activate_external_automation: false
  run_infinite_loops: false
  touch_live: false
  output_to_review_queue: true
automations:
  DAILY_RUNTIME_STATUS:
    purpose: Estado diario del runtime local y cabina.
    schedule_intent: daily_manual_or_future_scheduler
    execution_mode: PLAN
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/daily-runtime-status"
    human_review_required: true
    allowed_writes: [sanitized_readback]
    forbidden_writes: [live, remote, secrets, global_env]
    evidence_output: DAILY_RUNTIME_STATUS_READBACK
    gate_required: none_if_manual_local
  DAILY_GIT_STATUS_READBACK:
    purpose: Resumen diario de estado Git y staging.
    schedule_intent: daily_manual_or_future_scheduler
    execution_mode: OBSERVE
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/daily-git-status"
    human_review_required: true
    allowed_writes: [sanitized_readback]
    forbidden_writes: [stage, commit, push]
    evidence_output: DAILY_GIT_STATUS_READBACK
    gate_required: none
  DAILY_EVIDENCE_HEALTH:
    purpose: Revisar salud de evidencia, logs y out sin versionar crudos.
    schedule_intent: daily_manual_or_future_scheduler
    execution_mode: PLAN
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/daily-evidence-health"
    human_review_required: true
    allowed_writes: [sanitized_readback]
    forbidden_writes: [delete, move, raw_upload]
    evidence_output: DAILY_EVIDENCE_HEALTH_READBACK
    gate_required: evidence_policy_gate_if_versioning
  WEEKLY_AGENT_SKILLS_REVIEW:
    purpose: Revisar consistencia de agentes, skills y recipes.
    schedule_intent: weekly_manual_or_future_scheduler
    execution_mode: LEARN
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/weekly-agent-skills"
    human_review_required: true
    allowed_writes: [proposal, sanitized_readback]
    forbidden_writes: [install_tool, live_connector]
    evidence_output: WEEKLY_AGENT_SKILLS_REVIEW
    gate_required: owner_gate_if_registry_change
  WEEKLY_MANUAL_QUEUE_SUMMARY:
    purpose: Resumir cola manual para decision owner.
    schedule_intent: weekly_manual_or_future_scheduler
    execution_mode: PLAN
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/weekly-manual"
    human_review_required: true
    allowed_writes: [summary]
    forbidden_writes: [apply_decision]
    evidence_output: WEEKLY_MANUAL_QUEUE_SUMMARY
    gate_required: owner_gate_for_resolution
  WEEKLY_MULTIPLE_QUEUE_SUMMARY:
    purpose: Resumir multiples/candidatos para reconciliacion.
    schedule_intent: weekly_manual_or_future_scheduler
    execution_mode: PLAN
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/weekly-multiple"
    human_review_required: true
    allowed_writes: [summary]
    forbidden_writes: [auto_merge, auto_delete]
    evidence_output: WEEKLY_MULTIPLE_QUEUE_SUMMARY
    gate_required: owner_gate_for_resolution
  WEEKLY_MCP_CAPABILITY_REVIEW:
    purpose: Revisar capacidades MCP candidatas sin instalar secretos.
    schedule_intent: weekly_manual_or_future_scheduler
    execution_mode: DESIGN
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/weekly-mcp"
    human_review_required: true
    allowed_writes: [capability_proposal]
    forbidden_writes: [credential_write, live_connector]
    evidence_output: WEEKLY_MCP_CAPABILITY_REVIEW
    gate_required: owner_gate_if_secret_or_connector
  PRE_PR_GOVERNANCE_CHECK:
    purpose: Verificar pathspec, evidencia y gates antes de PR.
    schedule_intent: on_demand_before_pr
    execution_mode: PLAN
    isolated_workspace_required: true
    output_queue: ".cabina/organizacion-total/out/queues/pre-pr"
    human_review_required: true
    allowed_writes: [pre_pr_readback]
    forbidden_writes: [push, pr_create_without_gate]
    evidence_output: PRE_PR_GOVERNANCE_CHECK
    gate_required: owner_pr_gate
