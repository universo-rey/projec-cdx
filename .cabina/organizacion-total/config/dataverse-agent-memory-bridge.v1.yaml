schema_version: 1
contract_mode: ORGANISMO_VIVO_ENABLEMENT
bridge_id: DATAVERSE_AGENT_MEMORY_BRIDGE_G1
principle: "Dataverse mejora persistencia estructural; no bloquea funcion local."
status:
  local_bridge: LOCAL_DECLARED
  sync_readiness: READY_FOR_DATAVERSE_SYNC
  owner: OWNER_APPROVAL_REQUIRED
  live_sync: LIVE_SYNC_NOT_ACTIVE
entities:
  agentes:
    source: ".cabina/organizacion-total/config/top001-specialized-agents.v1.yaml"
    local_status: LOCAL_DECLARED
  herramientas:
    source: ".cabina/organizacion-total/config/top001-mcp-capabilities.v1.yaml"
    local_status: LOCAL_DECLARED
  temas:
    source: ".cabina/organizacion-total/config/top001-agent-teams.v1.yaml"
    local_status: LOCAL_DECLARED
  fuentes:
    source: "sanitized_readbacks"
    local_status: LOCAL_DECLARED
  skills:
    source: ".cabina/organizacion-total/config/agent-skills.v1.yaml"
    local_status: LOCAL_DECLARED
  recipes:
    source: ".cabina/organizacion-total/config/agent-recipes.v1.yaml"
    local_status: LOCAL_DECLARED
  capabilities:
    source: ".cabina/organizacion-total/config/cabina-top001-settings.v1.yaml"
    local_status: LOCAL_DECLARED
  evidence:
    source: ".cabina/organizacion-total/out/*.md saneado"
    local_status: LOCAL_DECLARED
  actions:
    source: "functional_agent_runtime"
    local_status: LOCAL_DECLARED
  learnings:
    source: "readbacks_and_federation_candidates"
    local_status: LOCAL_DECLARED
states:
  - LOCAL_DECLARED
  - READY_FOR_DATAVERSE_SYNC
  - OWNER_APPROVAL_REQUIRED
  - LIVE_SYNC_NOT_ACTIVE
rules:
  agent_function_does_not_depend_on_dataverse_live: true
  dataverse_write_requires_owner_gate: true
  no_live_sync_this_lane: true
  continue_local_memory_active: true
