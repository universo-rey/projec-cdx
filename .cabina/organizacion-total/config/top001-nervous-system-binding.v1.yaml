schema_version: 1
contract_mode: ORGANISMO_VIVO_ENABLEMENT
principle: "TOP001 se conecta al sistema nervioso como capacidades funcionales."
bindings:
  SPECIALIZED_AGENTS:
    connects_to: [AGENT_CELL, AGENT_SKILLS, FUNCTIONAL_AGENT_RUNTIME]
    can_execute_now: true
    local_mode: EXECUTE_LOCAL
    cloud_mode: RECEIVE_HANDOFF
    evidence: "TOP001_SPECIALIZED_AGENTS_AFTER_EXPANSION"
    fallback_if_cloud_missing: CONTINUE_LOCAL
    next_action: use_roles_in_functional_runtime
  AGENT_TEAMS:
    connects_to: [AGENT_CELL, VSCODE_INSIDERS, CODEX_LOCAL, CODEX_CLOUD]
    can_execute_now: true_for_modeling
    local_mode: PLAN
    cloud_mode: CLOUD_READY_PACKAGE
    evidence: "TOP001_AGENT_TEAMS_AFTER_EXPANSION"
    fallback_if_cloud_missing: local_team_reconciliation
    next_action: owner_decides_multiagent_runtime_activation
  MCP:
    connects_to: [MCP_LAYER, CODEX_LOCAL, CODEX_CLOUD, EXTERNAL_CAPABILITIES]
    can_execute_now: true_for_local_files_and_declarative_model
    local_mode: DESIGN
    cloud_mode: RETURN_PLAN
    evidence: "TOP001_MCP_AFTER_EXPANSION"
    fallback_if_cloud_missing: local_capability_catalog
    next_action: owner_gate_for_secret_backed_connector
  MONITORING_TRACES:
    connects_to: [CEO_EVIDENCE, CODEX_TRACES, CABINA_OUT, WATCHDOG]
    can_execute_now: true
    local_mode: LEARN
    cloud_mode: RETURN_READBACK
    evidence: "TOP001_MONITORING_AFTER_EXPANSION"
    fallback_if_cloud_missing: local_readback_only
    next_action: use_monitoring_runbook
  AUTOMATION:
    connects_to: [AUTOMATION_QUEUE, CEO_WATCHDOG, VSCODE_TASKS, CODEX_CLOUD_HANDOFF]
    can_execute_now: true_for_manual_queue
    local_mode: PLAN
    cloud_mode: RECEIVE_HANDOFF
    evidence: "TOP001_AUTOMATION_AFTER_EXPANSION"
    fallback_if_cloud_missing: manual_review_queue
    next_action: owner_gate_for_scheduler
