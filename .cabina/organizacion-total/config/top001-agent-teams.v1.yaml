schema_version: 1
contract_mode: ORGANISMO_VIVO_ENABLEMENT
principle: "Equipos multiagente para paralelizar sin perder reconciliacion."
manual_activation_note: "Si Codex requiere activacion manual, revisar /experimental y habilitar Multi-agents ON solo con confirmacion del entorno."
teams:
  TEAM_ORG_TOTAL:
    agents: [SESHAT, THOT, ANUBIS, MAAT, HORUS]
    purpose: Organizacion total local con canon, arquitectura, continuidad, evidencia y observabilidad.
    parallelizable_tasks: [inventory, classification, evidence_review, risk_opportunity_detection]
    reconciliation_owner: SESHAT
    conflict_policy: MAAT_decides_by_evidence_ANUBIS_blocks_on_scope
    context_budget_policy: summarize_each_lane_before_reconciliation
    handoff_policy: final_readback_with_owner_decisions
    evidence_output: TOP001_TEAM_ORG_TOTAL_READBACK
    allowed_modes: [EXPLORE, PLAN, EXECUTE_LOCAL, LEARN]
  TEAM_EXPANSION_DISCOVERY:
    agents: [SESHAT, EINSTEIN, FARADAY, RAMANUJAN, NARRADOR]
    purpose: Descubrir posibilidades, conexiones y patrones reutilizables.
    parallelizable_tasks: [opportunity_scan, alternative_modeling, capability_connection, convergence_detection]
    reconciliation_owner: NARRADOR
    conflict_policy: keep_multiple_hypotheses_until_evidence_selects
    context_budget_policy: compact_to_patterns_and_decisions
    handoff_policy: learning_readback_and_federation_candidates
    evidence_output: TOP001_EXPANSION_DISCOVERY_READBACK
    allowed_modes: [EXPLORE, DESIGN, LEARN, FEDERATE]
  TEAM_CONFIG_ENABLEMENT:
    agents: [THOT, ANUBIS, MAAT]
    purpose: Convertir configuracion en capacidad local reversible.
    parallelizable_tasks: [config_design, gate_validation, evidence_validation]
    reconciliation_owner: THOT
    conflict_policy: ANUBIS_blocks_if_gate_missing_MAAT_requires_evidence
    context_budget_policy: keep_diff_and_validator_summary
    handoff_policy: config_readback_with_rollback
    evidence_output: TOP001_CONFIG_ENABLEMENT_READBACK
    allowed_modes: [DESIGN, PLAN, EXECUTE_LOCAL]
  TEAM_EVIDENCE_LEARNING:
    agents: [MAAT, HORUS, NARRADOR]
    purpose: Convertir evidencia, drift y decisiones en aprendizaje operativo.
    parallelizable_tasks: [evidence_manifest, drift_warning, continuity_story]
    reconciliation_owner: MAAT
    conflict_policy: evidence_first_with_story_for_continuity
    context_budget_policy: retain_decisions_risks_and_next_action
    handoff_policy: session_handoff_and_learning_candidate
    evidence_output: TOP001_EVIDENCE_LEARNING_READBACK
    allowed_modes: [PLAN, LEARN, FEDERATE]
