schema_version: 1
contract_mode: ORGANISMO_VIVO_ENABLEMENT
protocol_id: CODEX_CLOUD_HANDOFF_G1
purpose: "Handoff local <-> Codex Cloud con contexto saneado y validacion local."
send_allowed:
  - baseline_ids
  - commit_ids
  - paths_no_sensibles
  - contratos
  - manifests_saneados
  - readbacks
  - skills
  - recipes
  - task_plans
  - error_summaries
send_forbidden:
  - secretos
  - tokens
  - credenciales
  - D3_D7_raw
  - documentos_notariales_raw
  - evidencia_SGIN_cruda
  - datos_personales_no_saneados
sanitize_steps:
  - remove_secret_values
  - replace_sensitive_paths_if_needed
  - include_only_minimal_context
  - attach_contract_and_mode
receive_allowed:
  - plan
  - patch
  - readback
  - analysis
  - test_instructions
local_validation:
  - parse_outputs
  - secret_scan
  - git_diff_check
  - pathspec_review
  - owner_gate_if_commit_or_remote
commit_conversion:
  mode: local_pathspec_only
  stage_automatic: false
  commit_automatic: false
learning_registration:
  - readback
  - skill_candidate
  - recipe_candidate
  - capability_candidate
federation:
  rule: "Solo federar valor saneado con identidad de origen, owner y evidencia."
fallback:
  if_cloud_unavailable: CLOUD_READY_PACKAGE
  do_not_block_local: true
