schema_version: 1
contract_mode: ORGANISMO_VIVO_ENABLEMENT
principle: "Lo observable aprende; lo trazable escala."
monitoring:
  agent_status_visible:
    status: required
    evidence: agent_status_readback
    can_execute_now: true
  tool_call_trace_available:
    status: local_summary_only
    evidence: tool_trace_summary
    raw_trace_versioning: false
  context_usage_policy:
    status: enabled
    rule: summarize_before_compaction_and_record_open_decisions
  compaction_warning_policy:
    status: enabled
    action: create_handoff_when_context_risk_is_high
  evidence_manifest_policy:
    status: enabled
    action: list_outputs_with_versionable_or_local_only_decision
  drift_warning_policy:
    status: enabled
    action: classify_as_risk_or_opportunity
  secret_scan_status:
    status: required_before_final
    action: block_on_material_secret
  action_real_detection:
    status: required
    action: distinguish_declarative_prepare_apply_live_remote
  session_readback_required:
    status: required
    action: final_readback_for_each_operation
forbidden:
  - raw_trace_versioning
  - raw_log_upload
  - secret_exposure
  - live_write_without_gate
task:
  label: "SDU TOP001: Monitoring"
  mode: readback
  target: ".cabina/organizacion-total/out/TOP001_MONITORING_AFTER_EXPANSION.md"
