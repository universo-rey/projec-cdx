schema_version: 1
contract_mode: ORGANISMO_VIVO_ENABLEMENT
principle: "MCP es capa de capacidades, no coleccion de conectores opacos."
inventory:
  global_codex_config:
    path: C:/Users/enzo1/.codex/config.toml
    inspected: redacted_sections_and_keys_only
    detected_sections: [tools.web_search, mcp_servers.node_repl, mcp_servers.node_repl.env, mcp_servers.agent-skills]
  local_codex_config:
    path: .codex/config.toml
    inspected: redacted_sections_and_keys_only
    detected_sections: []
capabilities:
  WEB_RESEARCH:
    candidate: exa.ai
    status: candidate_only
    gate: OWNER_GATE_IF_SECRET_REQUIRED
    allowed_now: false
    reason: no_secret_installation_without_owner_gate
  DOCS_BY_VERSION:
    candidate: Context7
    status: candidate_only
    gate: LOCAL_OR_OWNER_GATE
    allowed_now: declarative_only
    reason: no_external_installation_in_G1
  GITHUB_OPERATIONS:
    candidate: GitHub MCP
    status: candidate_only
    gate: REMOTE_GATE_REQUIRED
    allowed_now: false
    reason: remote_operations_require_gate
  BROWSER_AUTOMATION:
    candidate: Playwright MCP
    status: candidate_only
    gate: LOCAL_SANDBOX_OR_OWNER_GATE
    allowed_now: declarative_only
    reason: no_runtime_activation_without_scope
  LOCAL_FILES:
    candidate: filesystem/local
    status: available_by_workspace_tools
    gate: CONTRACT_LOCAL
    allowed_now: true_for_local_repo_scope
    reason: local_files_allowed_under_contract
  MICROSOFT_GRAPH:
    candidate: future
    status: future
    gate: OWNER_AND_TENANT_GATE
    allowed_now: false
    reason: tenant_and_owner_gate_required
  DATAVERSE:
    candidate: future
    status: future
    gate: G4_G5_OWNER_GATE
    allowed_now: false
    reason: live_data_surface
rules:
  no_install_mcp_with_secrets: true
  no_write_credentials: true
  no_connect_github_live: true
  no_connect_dataverse_live: true
  no_connect_sharepoint_live: true
  declarative_only_without_gate: true
